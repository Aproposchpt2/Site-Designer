<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowDesk Pro — Client Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
    :root {
      --purple:#5B3FB5;--purple-2:#7355d4;--sky:#82d8ff;--bg:#060e1c;--panel:rgba(11,22,42,0.82);
      --panel-2:rgba(16,30,56,0.7);--border:rgba(130,216,255,0.12);--border-2:rgba(130,216,255,0.22);
      --text:#eef4ff;--muted:#8fa8cc;--soft:#6282a8;--green:#2dd4a0;--amber:#f59e0b;--red:#f87171;
      --radius:16px;--radius-sm:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% -10%,rgba(91,63,181,0.32) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 10%,rgba(130,216,255,0.16) 0%,transparent 55%),radial-gradient(ellipse 40% 30% at 50% 100%,rgba(91,63,181,0.1) 0%,transparent 60%);pointer-events:none;z-index:0}
    #root{position:relative;z-index:1;min-height:100vh}
    .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border-2);border-radius:28px;padding:48px 40px;backdrop-filter:blur(24px);box-shadow:0 48px 120px rgba(0,0,0,0.6),0 0 0 1px rgba(130,216,255,0.06),inset 0 1px 0 rgba(130,216,255,0.12);animation:fadeUp .5s ease both}
    .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
    .auth-logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--purple),var(--sky));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;box-shadow:0 0 24px rgba(91,63,181,0.4)}
    .auth-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-0.02em}
    .auth-logo-text span{color:var(--sky)}
    .auth-heading{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;letter-spacing:-0.04em;line-height:1.1;margin-bottom:8px}
    .auth-sub{color:var(--muted);font-size:0.95rem;line-height:1.6;margin-bottom:36px}
    .auth-input{width:100%;background:rgba(130,216,255,0.06);border:1px solid var(--border-2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Mono',monospace;font-size:0.95rem;padding:14px 18px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px}
    .auth-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(130,216,255,0.12)}
    .auth-input::placeholder{color:var(--soft)}
    .auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--purple),#7a55e0);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 8px 32px rgba(91,63,181,0.5),inset 0 1px 0 rgba(255,255,255,0.12)}
    .auth-btn:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
    .auth-btn:disabled{opacity:.55;cursor:not-allowed}
    .auth-notice{margin-top:20px;text-align:center;font-size:0.85rem;color:var(--soft);line-height:1.5}
    .auth-sent{text-align:center;animation:fadeUp .4s ease both}
    .auth-sent-icon{font-size:3rem;margin-bottom:16px}
    .auth-sent h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:10px}
    .auth-sent p{color:var(--muted);font-size:0.95rem;line-height:1.6}
    .dash{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:rgba(6,14,28,0.92);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;backdrop-filter:blur(20px)}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 24px 28px;border-bottom:1px solid var(--border);margin-bottom:20px}
    .sidebar-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--sky));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:#fff;flex-shrink:0;box-shadow:0 0 28px rgba(91,63,181,0.5),inset 0 1px 0 rgba(255,255,255,0.15)}
    .sidebar-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;line-height:1.2}
    .sidebar-logo-text small{display:block;font-size:0.7rem;color:var(--muted);font-weight:400;font-family:'DM Sans',sans-serif;margin-top:1px}
    .nav-section{padding:0 12px;margin-bottom:8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius-sm);color:var(--muted);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all .18s;border:1px solid transparent;user-select:none}
    .nav-item:hover{color:var(--text);background:rgba(130,216,255,0.06)}
    .nav-item.active{color:var(--sky);background:rgba(130,216,255,0.1);border-color:rgba(130,216,255,0.18)}
    .nav-icon{width:20px;text-align:center;font-size:1rem;flex-shrink:0}
    .nav-badge{margin-left:auto;background:var(--purple);color:#fff;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:999px}
    .sidebar-footer{margin-top:auto;padding:20px 12px 0;border-top:1px solid var(--border)}
    .plan-badge-sidebar{background:rgba(91,63,181,0.2);border:1px solid rgba(91,63,181,0.35);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px}
    .plan-badge-sidebar .plan-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--sky);margin-bottom:4px}
    .plan-badge-sidebar .plan-status{font-size:0.75rem;color:var(--muted)}
    .plan-badge-sidebar .plan-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 6px var(--green)}
    .signout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.87rem;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
    .signout-btn:hover{color:var(--red);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.06)}
    .main{padding:40px 48px;overflow-y:auto}
    .page-header{margin-bottom:40px;animation:fadeUp .4s ease both}
    .page-header h1{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:-0.04em;line-height:1.1;margin-bottom:6px}
    .page-header p{color:var(--muted);font-size:0.95rem}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:36px}
    .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;backdrop-filter:blur(16px);transition:border-color .3s,transform .25s,box-shadow .3s;animation:fadeUp .4s ease both;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(130,216,255,0.3),transparent)}
    .stat-card:hover{border-color:var(--border-2);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
    .stat-label{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}
    .stat-value{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;letter-spacing:-0.06em;line-height:1;margin-bottom:8px}
    .stat-value.sky{color:var(--sky)}.stat-value.green{color:var(--green)}.stat-value.amber{color:var(--amber)}.stat-value.purple{color:var(--purple-2)}
    .stat-meta{font-size:0.8rem;color:var(--muted)}
    .stat-icon{position:absolute;top:20px;right:20px;font-size:1.6rem;opacity:0.2}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(16px);margin-bottom:28px;overflow:hidden;animation:fadeUp .45s ease both;box-shadow:0 4px 24px rgba(0,0,0,.25)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
    .panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;letter-spacing:-0.02em}
    .panel-meta{font-size:0.82rem;color:var(--muted)}
    .panel-action{background:rgba(130,216,255,0.1);border:1px solid var(--border-2);border-radius:8px;color:var(--sky);font-size:0.8rem;font-weight:600;padding:6px 14px;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
    .panel-action:hover{background:rgba(130,216,255,0.18)}
    .leads-table{width:100%;border-collapse:collapse}
    .leads-table th{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft);padding:12px 24px;text-align:left;border-bottom:1px solid var(--border)}
    .leads-table td{padding:16px 24px;font-size:0.88rem;border-bottom:1px solid rgba(130,216,255,0.05);color:var(--muted);vertical-align:middle}
    .leads-table tr:last-child td{border-bottom:none}
    .leads-table tr:hover td{background:rgba(130,216,255,0.03)}
    .lead-name{color:var(--text);font-weight:500}
    .lead-phone{font-family:'DM Mono',monospace;font-size:0.82rem}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:0.7rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
    .badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .badge.urgent{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.25)}.badge.urgent .badge-dot{background:var(--red);box-shadow:0 0 6px var(--red)}
    .badge.high{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.25)}.badge.high .badge-dot{background:var(--amber)}
    .badge.normal{background:rgba(130,216,255,0.1);color:var(--sky);border:1px solid rgba(130,216,255,0.2)}.badge.normal .badge-dot{background:var(--sky)}
    .badge.low{background:rgba(143,168,204,0.1);color:var(--muted);border:1px solid rgba(143,168,204,0.2)}.badge.low .badge-dot{background:var(--muted)}
    .badge.resolved{background:rgba(45,212,160,0.12);color:var(--green);border:1px solid rgba(45,212,160,0.25)}.badge.resolved .badge-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
    .badge.open{background:rgba(91,63,181,0.15);color:var(--purple-2);border:1px solid rgba(91,63,181,0.3)}.badge.open .badge-dot{background:var(--purple-2)}
    .usage-bar-wrap{padding:20px 24px}
    .usage-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .usage-label{font-size:0.88rem;color:var(--muted)}.usage-count{font-family:'DM Mono',monospace;font-size:0.88rem;color:var(--text)}
    .usage-track{height:6px;background:rgba(130,216,255,0.08);border-radius:999px;overflow:hidden;margin-bottom:8px}
    .usage-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--sky));transition:width .8s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(130,216,255,0.3)}
    .usage-note{font-size:0.75rem;color:var(--soft)}
    .client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:20px 24px}
    .client-mini-card{background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 20px;cursor:pointer;transition:all .2s}
    .client-mini-card:hover{border-color:var(--border-2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3)}
    .client-mini-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:6px}
    .client-mini-meta{font-size:0.78rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
    .empty-state{text-align:center;padding:60px 24px;color:var(--soft)}
    .empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:0.5}
    .empty-text{font-size:0.92rem}
    .spinner{width:20px;height:20px;border:2px solid rgba(130,216,255,0.2);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--muted);font-size:0.9rem}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(6,14,28,0.7);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10}
    .topbar-greeting{font-size:0.9rem;color:var(--muted)}.topbar-greeting strong{color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:14px}
    .realtime-dot{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--green);font-weight:600}
    .realtime-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @media(max-width:900px){.dash{grid-template-columns:1fr}.sidebar{display:none}.main{padding:24px 20px}.topbar{padding:16px 20px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
let sb = null;

const fmt = {
  date:(d)=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—',
  time:(d)=>d?new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'—',
  phone:(p)=>p?p.replace(/(\+1)?(\d{3})(\d{3})(\d{4})/,'($2) $3-$4'):'—',
  duration:(s)=>s?`${Math.floor(s/60)}m ${s%60}s`:'—',
};

const PLAN_INFO={starter:{label:'Starter',limit:200},command:{label:'Command',limit:750},agency:{label:'Agency',limit:Infinity}};

function UrgencyBadge({urgency}){const u=urgency||'normal';return <span className={`badge ${u}`}><span className="badge-dot"/>{u}</span>;}

function AuthScreen(){
  const[email,setEmail]=useState('');const[loading,setLoading]=useState(false);const[sent,setSent]=useState(false);const[error,setError]=useState('');
  const handleSubmit=async()=>{
    if(!email||!email.includes('@')){setError('Please enter a valid email address.');return;}
    setLoading(true);setError('');
    try{
      const res=await fetch('/.netlify/functions/auth-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.trim().toLowerCase()})});
      const data=await res.json();if(!data.success)throw new Error(data.error||'Request failed');setSent(true);
    }catch(e){setError(e.message||'Something went wrong. Try again.');}finally{setLoading(false);}
  };
  if(sent)return(<div className="auth-screen"><div className="auth-card"><div className="auth-logo"><div className="auth-logo-mark">FD</div><div className="auth-logo-text">FlowDesk <span>Pro</span></div></div><div className="auth-sent"><div className="auth-sent-icon">📬</div><h2>Check your inbox</h2><p>A secure login link was sent to <strong>{email}</strong>. Click it to access your portal. Expires in 60 minutes.</p></div></div></div>);
  return(<div className="auth-screen"><div className="auth-card"><div className="auth-logo"><div className="auth-logo-mark">FD</div><div className="auth-logo-text">FlowDesk <span>Pro</span></div></div><h1 className="auth-heading">Client<br/>Portal</h1><p className="auth-sub">Enter your account email to receive a secure, passwordless login link.</p><input className="auth-input" type="email" placeholder="you@yourbusiness.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSubmit()} autoFocus/>{error&&<p style={{color:'var(--red)',fontSize:'0.82rem',marginBottom:'12px'}}>{error}</p>}<button className="auth-btn" onClick={handleSubmit} disabled={loading}>{loading?<span className="spinner" style={{width:18,height:18}}/>:'Send Login Link →'}</button><p className="auth-notice">No password needed — secure magic links only.<br/><a href="mailto:support@aiflowdeskpro.com" style={{color:'var(--sky)'}}>support@aiflowdeskpro.com</a></p></div></div>);
}

function Sidebar({activeTab,setActiveTab,portalUser,clientData,agencyData,newLeadCount,onSignOut}){
  const isAgency=portalUser?.role==='agency_owner';
  const plan=clientData?.plan||agencyData?.plan||'starter';
  const planInfo=PLAN_INFO[plan]||PLAN_INFO.starter;
  const businessName=clientData?.business_name||agencyData?.business_name||'Your Business';
  const navItems=[{id:'overview',icon:'⬡',label:'Overview'},{id:'leads',icon:'📋',label:'Leads',badge:newLeadCount>0?newLeadCount:null},{id:'calls',icon:'📞',label:'Call Logs'},{id:'usage',icon:'📊',label:'Usage'},...(isAgency?[{id:'clients',icon:'🏢',label:'Sub-Clients'}]:[]),{id:'settings',icon:'⚙',label:'Settings'}];
  return(<aside className="sidebar"><div className="sidebar-logo"><div className="sidebar-logo-mark">FD</div><div className="sidebar-logo-text">FlowDesk Pro<small>{businessName}</small></div></div><nav className="nav-section">{navItems.map(item=>(<div key={item.id} className={`nav-item ${activeTab===item.id?'active':''}`} onClick={()=>setActiveTab(item.id)}><span className="nav-icon">{item.icon}</span>{item.label}{item.badge&&<span className="nav-badge">{item.badge}</span>}</div>))}</nav><div className="sidebar-footer"><div className="plan-badge-sidebar"><div className="plan-name">{planInfo.label} Plan</div><div className="plan-status"><span className="plan-dot"/>Active</div></div><button className="signout-btn" onClick={onSignOut}><span>↩</span> Sign Out</button></div></aside>);
}

function OverviewTab({leads,callLogs,clientData,agencyData,subClients}){
  const plan=clientData?.plan||agencyData?.plan||'starter';const planInfo=PLAN_INFO[plan]||PLAN_INFO.starter;
  const callCount=clientData?.call_count_month||callLogs.length;const callLimit=planInfo.limit===Infinity?'∞':planInfo.limit;
  const openLeads=leads.filter(l=>!l.resolved).length;const urgentLeads=leads.filter(l=>l.urgency==='urgent').length;const isAgency=!!agencyData;
  const stats=[{label:'Total Leads',value:leads.length,cls:'sky',icon:'📋',meta:'All time'},{label:'Open Leads',value:openLeads,cls:'purple',icon:'🔓',meta:'Awaiting follow-up'},{label:'Urgent',value:urgentLeads,cls:'amber',icon:'🚨',meta:'High priority'},{label:'Calls This Month',value:callCount,cls:'green',icon:'📞',meta:`of ${callLimit} limit`},...(isAgency?[{label:'Sub-Clients',value:subClients.length,cls:'sky',icon:'🏢',meta:'Active accounts'}]:[])];
  const recentLeads=[...leads].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
  return(<div><div className="stat-grid">{stats.map((s,i)=>(<div className="stat-card" key={s.label} style={{animationDelay:`${i*.07}s`}}><div className="stat-icon">{s.icon}</div><div className="stat-label">{s.label}</div><div className={`stat-value ${s.cls}`}>{s.value}</div><div className="stat-meta">{s.meta}</div></div>))}</div><div className="panel"><div className="panel-header"><span className="panel-title">Recent Leads</span><span className="panel-meta">{recentLeads.length} of {leads.length}</span></div>{recentLeads.length===0?<div className="empty-state"><div className="empty-icon">📭</div><div className="empty-text">No leads yet. Your AI agent is standing by.</div></div>:<table className="leads-table"><thead><tr><th>Caller</th><th>Phone</th><th>Urgency</th><th>Status</th><th>Date</th></tr></thead><tbody>{recentLeads.map(lead=>(<tr key={lead.id}><td><span className="lead-name">{lead.caller_name||'Unknown'}</span></td><td><span className="lead-phone">{fmt.phone(lead.caller_phone)}</span></td><td><UrgencyBadge urgency={lead.urgency}/></td><td><span className={`badge ${lead.resolved?'resolved':'open'}`}><span className="badge-dot"/>{lead.resolved?'Resolved':'Open'}</span></td><td>{fmt.date(lead.created_at)}</td></tr>))}</tbody></table>}</div></div>);
}

function LeadsTab({leads,onMarkResolved}){
  const[filter,setFilter]=useState('all');const[search,setSearch]=useState('');
  const filtered=leads.filter(l=>{const mf=filter==='all'||(filter==='open'&&!l.resolved)||(filter==='resolved'&&l.resolved)||l.urgency===filter;const ms=!search||(l.caller_name||'').toLowerCase().includes(search.toLowerCase())||(l.caller_phone||'').includes(search)||(l.summary||'').toLowerCase().includes(search.toLowerCase());return mf&&ms;});
  const sorted=[...filtered].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const filters=[{id:'all',label:'All'},{id:'open',label:'Open'},{id:'urgent',label:'Urgent'},{id:'high',label:'High'},{id:'resolved',label:'Resolved'}];
  return(<div><div style={{display:'flex',gap:'12px',marginBottom:'24px',flexWrap:'wrap',alignItems:'center'}}><input style={{flex:1,minWidth:200,background:'rgba(130,216,255,0.06)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text)',fontFamily:'DM Mono,monospace',fontSize:'0.88rem',padding:'10px 14px',outline:'none'}} placeholder="Search by name, phone, or summary..." value={search} onChange={e=>setSearch(e.target.value)}/><div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>{filters.map(f=>(<button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:'8px 14px',borderRadius:'var(--radius-sm)',border:'1px solid',cursor:'pointer',fontSize:'0.78rem',fontWeight:600,fontFamily:'DM Sans,sans-serif',transition:'all .18s',background:filter===f.id?'rgba(130,216,255,0.14)':'transparent',borderColor:filter===f.id?'var(--border-2)':'var(--border)',color:filter===f.id?'var(--sky)':'var(--muted)'}}>{f.label}</button>))}</div></div><div className="panel"><div className="panel-header"><span className="panel-title">Lead Records</span><span className="panel-meta">{sorted.length} leads</span></div>{sorted.length===0?<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">No leads match your filter.</div></div>:<table className="leads-table"><thead><tr><th>Caller</th><th>Phone</th><th>Summary</th><th>Urgency</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>{sorted.map(lead=>(<tr key={lead.id}><td><span className="lead-name">{lead.caller_name||'Unknown'}</span></td><td><span className="lead-phone">{fmt.phone(lead.caller_phone)}</span></td><td style={{maxWidth:200,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{lead.summary||'—'}</td><td><UrgencyBadge urgency={lead.urgency}/></td><td><span className={`badge ${lead.resolved?'resolved':'open'}`}><span className="badge-dot"/>{lead.resolved?'Resolved':'Open'}</span></td><td style={{fontFamily:'DM Mono,monospace',fontSize:'0.78rem',whiteSpace:'nowrap'}}>{fmt.date(lead.created_at)}<br/><span style={{color:'var(--soft)',fontSize:'0.72rem'}}>{fmt.time(lead.created_at)}</span></td><td>{!lead.resolved&&<button onClick={()=>onMarkResolved(lead.id)} className="panel-action">✓ Resolve</button>}</td></tr>))}</tbody></table>}</div></div>);
}

function CallsTab({callLogs}){
  const sorted=[...callLogs].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return(<div className="panel"><div className="panel-header"><span className="panel-title">Call Log</span><span className="panel-meta">{callLogs.length} total calls</span></div>{sorted.length===0?<div className="empty-state"><div className="empty-icon">📞</div><div className="empty-text">No calls recorded yet.</div></div>:<table className="leads-table"><thead><tr><th>Call SID</th><th>Duration</th><th>Outcome</th><th>Lead Created</th><th>Date</th></tr></thead><tbody>{sorted.map(log=>(<tr key={log.id}><td><span style={{fontFamily:'DM Mono,monospace',fontSize:'0.75rem',color:'var(--soft)'}}>{log.twilio_call_sid?.slice(0,12)||'—'}…</span></td><td>{fmt.duration(log.duration_seconds)}</td><td><span className={`badge ${log.outcome==='completed'?'normal':log.outcome==='no-answer'?'high':'urgent'}`}><span className="badge-dot"/>{log.outcome||'completed'}</span></td><td><span className={`badge ${log.lead_created?'resolved':'low'}`}><span className="badge-dot"/>{log.lead_created?'Yes':'No'}</span></td><td style={{fontFamily:'DM Mono,monospace',fontSize:'0.78rem'}}>{fmt.date(log.created_at)}</td></tr>))}</tbody></table>}</div>);
}

function UsageTab({clientData,agencyData,callLogs}){
  const plan=clientData?.plan||agencyData?.plan||'starter';const planInfo=PLAN_INFO[plan]||PLAN_INFO.starter;
  const used=clientData?.call_count_month||callLogs.length;const limit=planInfo.limit;const pct=limit===Infinity?0:Math.min(100,Math.round((used/limit)*100));
  return(<div><div className="panel"><div className="panel-header"><span className="panel-title">Monthly Call Usage</span><span className="panel-meta">{planInfo.label} Plan</span></div><div className="usage-bar-wrap"><div className="usage-row"><span className="usage-label">Calls used this month</span><span className="usage-count">{used} / {limit===Infinity?'Unlimited':limit}</span></div>{limit!==Infinity?<><div className="usage-track"><div className="usage-fill" style={{width:`${pct}%`}}/></div><div className="usage-note">{pct}% used · resets on the 1st of next month</div>{pct>=80&&<div style={{marginTop:14,padding:'12px 14px',background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:'var(--radius-sm)',fontSize:'0.85rem',color:'var(--amber)'}}>⚠ You're at {pct}% of your monthly limit. Consider upgrading.</div>}</>:<div style={{marginTop:8,padding:'12px 14px',background:'rgba(45,212,160,0.1)',border:'1px solid rgba(45,212,160,0.25)',borderRadius:'var(--radius-sm)',fontSize:'0.85rem',color:'var(--green)'}}>✓ Agency plan — unlimited calls, no cap.</div>}</div></div><div className="panel"><div className="panel-header"><span className="panel-title">Plan Details</span></div><div style={{padding:'20px 24px'}}>{[{label:'Current Plan',value:planInfo.label},{label:'Call Limit',value:limit===Infinity?'Unlimited':`${limit} / month`},{label:'Status',value:clientData?.status||agencyData?.status||'active'},{label:'Billing',value:'Managed via Stripe'}].map(item=>(<div key={item.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--muted)',fontSize:'0.88rem'}}>{item.label}</span><span style={{fontFamily:'DM Mono,monospace',fontSize:'0.88rem',color:'var(--text)',textTransform:'capitalize'}}>{item.value}</span></div>))}</div></div></div>);
}

function ClientsTab({subClients,allLeads}){
  return(<div className="panel"><div className="panel-header"><span className="panel-title">Sub-Client Accounts</span><span className="panel-meta">{subClients.length} active</span></div>{subClients.length===0?<div className="empty-state"><div className="empty-icon">🏢</div><div className="empty-text">No sub-clients yet.</div></div>:<div className="client-grid">{subClients.map(client=>{const cl=allLeads.filter(l=>l.client_id===client.id);const oc=cl.filter(l=>!l.resolved).length;return(<div className="client-mini-card" key={client.id}><div className="client-mini-name">{client.business_name}</div><div className="client-mini-meta"><span style={{textTransform:'capitalize'}}>{client.plan}</span><span>·</span><span>{cl.length} leads</span>{oc>0&&<><span>·</span><span style={{color:'var(--amber)'}}>{oc} open</span></>}</div></div>);})}</div>}</div>);
}

function SettingsTab({clientData,agencyData,portalUser}){
  const entity=clientData||agencyData;const isAgency=portalUser?.role==='agency_owner';
  return(<div><div className="panel"><div className="panel-header"><span className="panel-title">Account Information</span></div><div style={{padding:'20px 24px'}}>{[{label:'Business Name',value:entity?.business_name||'—'},{label:'Account Email',value:clientData?.resend_to_email||agencyData?.owner_email||'—'},{label:'Role',value:isAgency?'Agency Owner':'Client'},{label:'Plan',value:(entity?.plan||'starter').charAt(0).toUpperCase()+(entity?.plan||'starter').slice(1)},{label:'Account ID',value:entity?.id?.slice(0,8)+'…'||'—'}].map(item=>(<div key={item.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--muted)',fontSize:'0.88rem'}}>{item.label}</span><span style={{fontFamily:'DM Mono,monospace',fontSize:'0.85rem',color:'var(--text)'}}>{item.value}</span></div>))}</div></div><div className="panel"><div className="panel-header"><span className="panel-title">Support</span></div><div style={{padding:'20px 24px'}}><p style={{color:'var(--muted)',fontSize:'0.9rem',lineHeight:1.7,marginBottom:16}}>Need help? Our team is ready to assist.</p><a href="mailto:support@aiflowdeskpro.com" className="panel-action" style={{display:'inline-block'}}>📧 support@aiflowdeskpro.com</a></div></div></div>);
}

function Dashboard({user,portalUser,onSignOut}){
  const[activeTab,setActiveTab]=useState('overview');const[clientData,setClientData]=useState(null);const[agencyData,setAgencyData]=useState(null);const[leads,setLeads]=useState([]);const[callLogs,setCallLogs]=useState([]);const[subClients,setSubClients]=useState([]);const[loading,setLoading]=useState(true);const[newLeadCount,setNewLeadCount]=useState(0);const seenLeadIds=useRef(new Set());const isAgency=portalUser?.role==='agency_owner';
  const fetchData=useCallback(async()=>{try{if(portalUser.client_id){const{data}=await sb.from('clients').select('*').eq('id',portalUser.client_id).single();setClientData(data);}if(portalUser.agency_id){const{data}=await sb.from('agencies').select('*').eq('id',portalUser.agency_id).single();setAgencyData(data);}const lq=isAgency?sb.from('leads').select('*').order('created_at',{ascending:false}):sb.from('leads').select('*').eq('client_id',portalUser.client_id).order('created_at',{ascending:false});const{data:ld}=await lq;const fl=ld||[];fl.forEach(l=>seenLeadIds.current.add(l.id));setLeads(fl);const cq=isAgency?sb.from('call_logs').select('*').order('created_at',{ascending:false}):sb.from('call_logs').select('*').eq('client_id',portalUser.client_id).order('created_at',{ascending:false});const{data:cd}=await cq;setCallLogs(cd||[]);if(isAgency&&portalUser.agency_id){const{data:sc}=await sb.from('clients').select('*').eq('agency_id',portalUser.agency_id);setSubClients(sc||[]);}}catch(e){console.error('Fetch error:',e);}finally{setLoading(false);}
  },[portalUser,isAgency]);
  useEffect(()=>{fetchData();},[fetchData]);
  useEffect(()=>{const channel=sb.channel('leads-realtime').on('postgres_changes',{event:'INSERT',schema:'public',table:'leads'},(payload)=>{const nl=payload.new;const io=isAgency||nl.client_id===portalUser.client_id;if(!io)return;setLeads(prev=>[nl,...prev]);if(!seenLeadIds.current.has(nl.id)){setNewLeadCount(n=>n+1);seenLeadIds.current.add(nl.id);}}).on('postgres_changes',{event:'UPDATE',schema:'public',table:'leads'},(payload)=>{setLeads(prev=>prev.map(l=>l.id===payload.new.id?payload.new:l));}).subscribe();return()=>sb.removeChannel(channel);},[portalUser,isAgency]);
  const handleMarkResolved=async(leadId)=>{await sb.from('leads').update({resolved:true}).eq('id',leadId);setLeads(prev=>prev.map(l=>l.id===leadId?{...l,resolved:true}:l));};
  const handleTabChange=(tab)=>{setActiveTab(tab);if(tab==='leads')setNewLeadCount(0);};
  const businessName=clientData?.business_name||agencyData?.business_name||'your account';
  const TAB_TITLES={overview:['Overview','Your FlowDesk Pro command center.'],leads:['Leads','Every qualified caller, captured automatically.'],calls:['Call Logs','Full log of every inbound call.'],usage:['Usage','Your monthly call usage and plan details.'],clients:['Sub-Clients','All sub-client accounts under your agency.'],settings:['Settings','Account details and support.']};
  if(loading)return(<div className="loading-screen"><div className="spinner" style={{width:32,height:32}}/><span>Loading your portal…</span></div>);
  return(<div className="dash"><Sidebar activeTab={activeTab} setActiveTab={handleTabChange} portalUser={portalUser} clientData={clientData} agencyData={agencyData} newLeadCount={newLeadCount} onSignOut={onSignOut}/><div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}><div className="topbar"><div className="topbar-greeting">Welcome back, <strong>{businessName}</strong></div><div className="topbar-right"><span className="realtime-dot">Live</span><span style={{fontSize:'0.8rem',color:'var(--soft)',fontFamily:'DM Mono,monospace'}}>{user.email}</span></div></div><div className="main"><div className="page-header"><h1>{TAB_TITLES[activeTab][0]}</h1><p>{TAB_TITLES[activeTab][1]}</p></div>{activeTab==='overview'&&<OverviewTab leads={leads} callLogs={callLogs} clientData={clientData} agencyData={agencyData} subClients={subClients}/>}{activeTab==='leads'&&<LeadsTab leads={leads} onMarkResolved={handleMarkResolved}/>}{activeTab==='calls'&&<CallsTab callLogs={callLogs}/>}{activeTab==='usage'&&<UsageTab clientData={clientData} agencyData={agencyData} callLogs={callLogs}/>}{activeTab==='clients'&&<ClientsTab subClients={subClients} allLeads={leads}/>}{activeTab==='settings'&&<SettingsTab clientData={clientData} agencyData={agencyData} portalUser={portalUser}/>}</div></div></div>);
}

function App(){
  const[configReady,setConfigReady]=useState(false);const[configError,setConfigError]=useState('');const[session,setSession]=useState(undefined);const[portalUser,setPortalUser]=useState(null);const[claiming,setClaiming]=useState(false);
  useEffect(()=>{fetch('/.netlify/functions/config').then(r=>r.json()).then(data=>{if(!data.supabaseUrl||!data.supabaseKey)throw new Error('Missing config');sb=supabase.createClient(data.supabaseUrl,data.supabaseKey);setConfigReady(true);}).catch(()=>setConfigError('Portal configuration error. Please contact support@aiflowdeskpro.com'));},[]);
  useEffect(()=>{if(!configReady)return;sb.auth.getSession().then(({data:{session}})=>setSession(session));const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{setSession(session);if(session&&(event==='SIGNED_IN'||event==='TOKEN_REFRESHED')){setClaiming(true);try{const res=await fetch('/.netlify/functions/auth-claim',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify({})});const data=await res.json();if(data.portal_user)setPortalUser(data.portal_user);}catch(e){console.error('Claim error:',e);}finally{setClaiming(false);}}});return()=>subscription.unsubscribe();},[configReady]);
  const handleSignOut=async()=>{await sb.auth.signOut();setSession(null);setPortalUser(null);};
  if(configError)return(<div className="loading-screen"><div style={{fontSize:'2rem'}}>⚠️</div><span style={{color:'var(--red)'}}>{configError}</span></div>);
  if(!configReady||session===undefined||claiming)return(<div className="loading-screen"><div className="spinner" style={{width:32,height:32}}/><span>{claiming?'Setting up your portal…':'Loading…'}</span></div>);
  if(!session)return <AuthScreen/>;
  if(!portalUser)return(<div className="loading-screen"><div className="spinner" style={{width:32,height:32}}/><span>Verifying account…</span></div>);
  return <Dashboard user={session.user} portalUser={portalUser} onSignOut={handleSignOut}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
